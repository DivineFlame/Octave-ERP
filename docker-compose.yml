services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: App
    restart: unless-stopped
    ports:
      - "3002:80"

  paperclip:
    image: ${PAPERCLIP_IMAGE:-paperclip:latest}
    container_name: paperclip
    restart: unless-stopped
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    ports:
      - "3100:80"
