services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: App
    restart: unless-stopped
    ports:
      - "3002:80"
    depends_on:
      api:
        condition: service_healthy

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: octave-api
    restart: unless-stopped
    environment:
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-octave}:${POSTGRES_PASSWORD:-octave_password}@postgres:5432/${POSTGRES_DB:-octave_crm}
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-northstar}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      PAPERCLIP_BASE_URL: ${PAPERCLIP_BASE_URL:-http://paperclip}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://38.247.188.228:3002}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://38.247.188.228:3002}
      APP_SECRET: ${APP_SECRET:-change-this-octave-secret}
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads-data:/app/uploads
    ports:
      - "3200:3000"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started

  paperclip:
    build:
      context: ./paperclip
      dockerfile: Dockerfile
    container_name: paperclip
    restart: unless-stopped
    environment:
      PORT: 80
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      DEFAULT_MODEL: ${DEFAULT_OLLAMA_MODEL:-llama3.1:8b}
    ports:
      - "3100:80"
    depends_on:
      ollama:
        condition: service_started

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"

  postgres:
    image: postgres:16-alpine
    container_name: octave-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-octave}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-octave_password}
      POSTGRES_DB: ${POSTGRES_DB:-octave_crm}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-octave} -d ${POSTGRES_DB:-octave_crm}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  ollama-data:
  uploads-data:
